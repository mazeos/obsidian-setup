name: Notificar push a Discord

on:
  push:
    branches: ["**"]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Enviar notificación a Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: "1490500278250770472"
        run: |
          AUTHOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          COMMIT_URL="https://github.com/$REPO/commit/$COMMIT_SHA"

          PAYLOAD=$(cat <<EOF
          {
            "content": "**📦 Push en \`$REPO\`**\n\`$BRANCH\` → [\`$SHORT_SHA\`]($COMMIT_URL)\n> $COMMIT_MSG\n— $AUTHOR"
          }
          EOF
          )

          curl -s -X POST \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages"
